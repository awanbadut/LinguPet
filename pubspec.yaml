name: lingupet
description: "LinguPet - Preserve Language Through Play"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0

  # UI & Animation
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  confetti: ^0.7.0
  flutter_svg: ^2.0.9

  # Media (Audio & Video)
  audioplayers: ^5.2.1
  video_player: ^2.8.3
  record: ^6.0.0

  # Utility & Storage
  path_provider: ^2.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/asset/icon/logo.png"
  min_sdk_android: 21
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/asset/icon/logo.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/asset/flag/
    - assets/asset/maskot/
    - assets/asset/pet/
    - assets/asset/avatar/
    - assets/asset/icon/      # ✅ Tambah folder icon
    # - assets/asset/audio/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
